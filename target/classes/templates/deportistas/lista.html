<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SportLogic - Lista de Deportistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Deportistas</h2>
            <a th:href="@{/admin/deportistas/nuevo}" class="btn btn-primary">+ Nuevo Deportista</a>
        </div>

        <div th:if="${param.success}" class="alert alert-success">
            ¡Deportista registrado con éxito!
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Posición</th>
                            <th>Usuario</th>
                            <th>Estado Salud</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dep : ${deportistas}">
                            <td th:text="${dep.nombreCompleto}"></td>
                            <td th:text="${dep.posicion}"></td>
                            <td th:text="${dep.usuario.username}"></td>
                            <td>
                                <span th:text="${dep.estadoSalud}" 
                                      class="badge" 
                                      th:classappend="${dep.estadoSalud == 'Óptimo' ? 'bg-success' : 'bg-danger'}">
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-info text-white">Ver Ficha</button>
                                <button class="btn btn-sm btn-warning">Editar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{/dashboard}" class="btn btn-outline-dark">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
