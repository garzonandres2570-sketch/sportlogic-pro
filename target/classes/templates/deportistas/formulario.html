<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SportLogic - Registro Ligero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #333; font-family: 'Inter', sans-serif; }
        .card { background-color: #ffffff; border: 1px solid #e1e4e8; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-control, .form-select { background-color: #ffffff; border: 1px solid #ced4da; color: #495057; }
        .form-control:focus { border-color: #17a2b8; box-shadow: 0 0 0 0.2rem rgba(23, 162, 184, 0.25); }
        label { color: #5a6268; font-weight: 600; }
        .btn-cyan { background-color: #17a2b8; border: none; color: white; font-weight: bold; }
        .btn-cyan:hover { background-color: #138496; color: white; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div th:if="${error}" class="alert alert-danger border-0 shadow-sm mb-4 bg-danger text-white">
            <span th:text="${error}"></span>
        </div>

        <div class="card p-3">
            <div class="card-header border-0 pt-3 pb-0 bg-transparent">
                <h3 class="fw-bold text-dark">Alta de Deportista <span class="text-cyan">HU001</span></h3>
                <p class="text-muted small">Completa la ficha para registrar un nuevo integrante del club.</p>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/admin/deportistas/guardar}" th:object="${deportista}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" th:field="*{nombreCompleto}" class="form-control" required placeholder="Ej: Andrés Garzón">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Posición Principal</label>
                            <select th:field="*{posicion}" class="form-select">
                                <option value="Portero">Portero</option>
                                <option value="Defensa">Defensa</option>
                                <option value="Mediocampista">Mediocampista</option>
                                <option value="Delantero">Delantero</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" th:field="*{usuario.email}" class="form-control" required placeholder="Ej: deportivo@test.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre de Usuario (Login)</label>
                            <input type="text" th:field="*{usuario.username}" class="form-control" required placeholder="Ej: andres_dep01">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contraseña Temporal</label>
                            <input type="password" name="rawPassword" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estado de Salud Inicial</label>
                            <select th:field="*{estadoSalud}" class="form-select">
                                <option value="Óptimo">Óptimo (Apto para jugar)</option>
                                <option value="Lesionado">Lesionado</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 d-grid gap-2 d-md-block">
                        <button type="submit" class="btn btn-cyan px-5 py-2">Confirmar Registro</button>
                        <a th:href="@{/admin/deportistas}" class="btn btn-outline-secondary px-4">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
