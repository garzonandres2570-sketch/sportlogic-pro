<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportLogic | Mi Entrenamiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .app-header { background: linear-gradient(45deg, #17a2b8, #117a8b); padding: 30px 20px; border-radius: 0 0 30px 30px; }
        .task-card { 
            background: #1e1e1e; border: none; border-radius: 20px; margin-bottom: 20px; 
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .task-img { height: 120px; object-fit: cover; width: 100%; opacity: 0.7; }
        .btn-complete { 
            background: #28a745; border: none; border-radius: 12px; 
            padding: 12px; font-weight: bold; color: white; transition: 0.3s;
        }
        .btn-complete:disabled { background: #444; color: #888; }
        .time-label { color: #17a2b8; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app-header text-center shadow">
        <h4 class="fw-bold mb-0">HOLA, [[${deportista.nombreCompleto}]]</h4>
        <p class="small opacity-75">Tu plan de hoy está listo</p>
    </div>

    <div class="container mt-4 pb-5">
        <h6 class="text-uppercase text-muted fw-bold mb-3" style="letter-spacing: 1px;">Próximas Sesiones</h6>

        <div th:each="ent : ${entrenamientos}" class="task-card">
            <div class="position-relative">
                <img th:src="${ent.imagenUrl}" class="task-img">
                <div class="position-absolute bottom-0 start-0 p-3 w-100" style="background: linear-gradient(transparent, #1e1e1e);">
                    <span class="time-label">
                        <span class="material-symbols-outlined style='font-size:14px'">schedule</span>
                        [[${#temporals.format(ent.fechaHora, 'HH:mm')}]] hs
                    </span>
                </div>
            </div>

            <div class="card-body">
                <h5 class="fw-bold text-white mb-1" th:text="${ent.titulo}">Título</h5>
                <p class="small text-info mb-2 d-flex align-items-center">
                    <span class="material-symbols-outlined me-1" style="font-size: 16px;">location_on</span>
                    [[${ent.lugar}]]
                </p>
                <p class="text-secondary small mb-4" th:text="${ent.descripcion}">Instrucciones...</p>

                <form th:action="@{/deportista/completar/{id}(id=${ent.id})}" method="post">
                    <input type="hidden" name="deportistaId" th:value="${deportista.id}">
                    
                    <button type="submit" class="btn-complete w-100 d-flex align-items-center justify-content-center" 
                            th:disabled="${ent.completado}">
                        <span class="material-symbols-outlined me-2">
                            [[${ent.completado ? 'check_circle' : 'task_alt'}]]
                        </span>
                        [[${ent.completado ? 'SESIÓN COMPLETADA' : 'MARCAR COMO LISTO'}]]
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(entrenamientos)}" class="text-center py-5">
            <span class="material-symbols-outlined style='font-size:48px'" class="text-muted">hotel</span>
            <p class="mt-2 text-muted">No tienes tareas pendientes.<br>¡Descansa!</p>
        </div>
    </div>

</body>
</html>
