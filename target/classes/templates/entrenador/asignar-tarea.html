<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SportLogic | Asignar Entrenamiento Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --cyan-main: #17a2b8; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-cyan { background-color: var(--cyan-main); color: white; transition: all 0.3s; border-radius: 50px; }
        .btn-cyan:hover { background-color: #138496; color: white; transform: translateY(-2px); }
        .form-label { font-weight: 600; color: #495057; }
        .form-control, .form-select { border-radius: 10px; border: 1px solid #dee2e6; padding: 10px 15px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="mb-3">
                    <a th:href="@{/entrenador/seguimiento}" class="text-decoration-none text-muted d-flex align-items-center">
                        <span class="material-symbols-outlined me-1">arrow_back</span> Volver al seguimiento
                    </a>
                </div>

                <div class="card p-5">
                    <div class="d-flex align-items-center mb-4">
                        <span class="material-symbols-outlined text-info me-3" style="font-size: 40px;">stadium</span>
                        <h3 class="fw-bold text-dark mb-0">Programar <span class="text-info">Actividad Pro</span></h3>
                    </div>

                    <form th:action="@{/entrenador/guardar}" th:object="${entrenamiento}" method="post">
                        
                        <div class="mb-4">
                            <label class="form-label">Título del Ejercicio / Partido</label>
                            <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ej: Final Copa Local o Sesión de Pesas" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Deportista Asignado</label>
                                <select th:field="*{deportista}" class="form-select" required>
                                    <option value="" disabled selected>Seleccione un jugador...</option>
                                    <option th:each="d : ${deportistas}" th:value="${d.id}" th:text="${d.nombreCompleto}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Lugar / Estadio</label>
                                <input type="text" th:field="*{lugar}" class="form-control" placeholder="Ej: Estadio Metropolitano" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Fecha y Hora Exacta</label>
                                <input type="datetime-local" th:field="*{fechaHora}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">URL Foto del Estadio/Gym</label>
                                <input type="text" th:field="*{imagenUrl}" class="form-control" placeholder="https://imagen.com/estadio.jpg">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Instrucciones Detalladas</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Detalles de la convocatoria o rutina..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-cyan w-100 py-3 fw-bold shadow-sm">
                            <span class="material-symbols-outlined me-2">calendar_month</span>
                            PUBLICAR EN LA AGENDA
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
