<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <h5 class="fw-bold text-danger mb-3">Registrar Lesión</h5>
                    <form th:action="@{/medico/guardar-lesion}" th:object="${nuevaLesion}" method="post">
                        <input type="hidden" name="deportistaId" th:value="${deportista.id}">
                        <div class="mb-2">
                            <label class="small fw-bold">Tipo de Lesión</label>
                            <input type="text" th:field="*{tipoLesion}" class="form-control form-control-sm" placeholder="Ej: Rotura fibrilar" required>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">Gravedad</label>
                            <select th:field="*{gravedad}" class="form-select form-select-sm">
                                <option value="Leve">Leve</option>
                                <option value="Media">Media</option>
                                <option value="Grave">Grave</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">Retorno Estimado</label>
                            <input type="date" th:field="*{fechaFinEstimada}" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Observaciones</label>
                            <textarea th:field="*{observaciones}" class="form-control form-control-sm" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger btn-sm w-100 rounded-pill">Registrar en Expediente</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4">
                    <div class="d-flex justify-content-between mb-3">
                        <h4 class="fw-bold">Expediente: <span class="text-primary" th:text="${deportista.nombreCompleto}"></span></h4>
                        <a th:href="@{/medico/pacientes}" class="btn btn-sm btn-outline-secondary">Volver</a>
                    </div>
                    
                    <div th:if="${#lists.isEmpty(lesiones)}" class="text-center py-5">
                        <p class="text-muted">Sin lesiones registradas previamente. ¡Excelente salud!</p>
                    </div>

                    <div class="table-responsive" th:if="${!#lists.isEmpty(lesiones)}">
                        <table class="table table-sm">
                            <thead>
                                <tr class="small text-muted">
                                    <th>Fecha</th>
                                    <th>Lesión</th>
                                    <th>Gravedad</th>
                                    <th>Retorno</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="l : ${lesiones}">
                                    <td th:text="${l.fechaInicio}"></td>
                                    <td class="fw-bold" th:text="${l.tipoLesion}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${l.gravedad == 'Grave' ? 'bg-danger' : 'bg-warning text-dark'}" th:text="${l.gravedad}"></span>
                                    </td>
                                    <td th:text="${l.fechaFinEstimada}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
